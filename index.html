<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Om Luhar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="shell">
    <div class="main" id="main">
      <header class="top-bar">
        <button
          type="button"
          class="menu-toggle"
          id="menu-toggle"
          aria-expanded="false"
          aria-controls="section-menu"
          aria-label="Open menu"
        >
          <span class="menu-icon" aria-hidden="true">
            <span></span><span></span><span></span>
          </span>
        </button>
      </header>

      <main class="content">
        <section id="home" class="section section--home">
          <h1 class="name">Om Luhar</h1>
        </section>

        <section id="experience" class="section section--placeholder" aria-label="Experience">
          <!-- Experience content will go here -->
        </section>

        <section id="projects" class="section section--placeholder" aria-label="Projects">
          <!-- Projects content will go here -->
        </section>

        <section id="contact" class="section section--placeholder" aria-label="Contact me">
          <!-- Contact content will go here -->
        </section>
      </main>
    </div>

    <nav class="drawer" id="section-menu" aria-hidden="true">
      <ul class="drawer-list">
        <li><button type="button" data-target="home">Home</button></li>
        <li><button type="button" data-target="experience">Experience</button></li>
        <li><button type="button" data-target="projects">Projects</button></li>
        <li><button type="button" data-target="contact">Contact me</button></li>
      </ul>
    </nav>
  </div>

  <script>
    const body = document.body;
    const toggle = document.getElementById("menu-toggle");
    const drawer = document.getElementById("section-menu");
    const main = document.getElementById("main");

    function openMenu() {
      body.classList.add("menu-open");
      toggle.setAttribute("aria-expanded", "true");
      toggle.setAttribute("aria-label", "Close menu");
      drawer.setAttribute("aria-hidden", "false");
      body.style.overflow = "hidden";
    }

    function closeMenu() {
      body.classList.remove("menu-open");
      toggle.setAttribute("aria-expanded", "false");
      toggle.setAttribute("aria-label", "Open menu");
      drawer.setAttribute("aria-hidden", "true");
      body.style.overflow = "";
    }

    function toggleMenu() {
      if (body.classList.contains("menu-open")) closeMenu();
      else openMenu();
    }

    toggle.addEventListener("click", toggleMenu);

    drawer.querySelectorAll("[data-target]").forEach((btn) => {
      btn.addEventListener("click", () => {
        const id = btn.getAttribute("data-target");
        const el = document.getElementById(id);
        closeMenu();
        requestAnimationFrame(() => {
          el?.scrollIntoView({ behavior: "smooth", block: "start" });
        });
      });
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && body.classList.contains("menu-open")) closeMenu();
    });
  </script>
</body>
</html>
